      data-white="imagem/home_100dp_FFFFFF_FILL0_wght400_GRAD0_opsz48.png"

    <span>Home</span>

      alt="Conteúdo" class="icon w-6 h-6">

  <!-- Dashboard -->

      src="imagem/analytics_100dp_000000_FILL0_wght400_GRAD0_opsz48.png" 
      data-white="imagem/analytics_100dp_FFFFFF_FILL0_wght400_GRAD0_opsz48.png"

<!-- Modal Configurações -->
<div id="config-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="text-white bg-blue-600 w-96 rounded-2xl shadow-2xl p-6">
    <h2 class="text-xl font-bold mb-4 text-blue-600 dark:text-white">Configurações</h2>

    <div class="space-y-4 bg-blue-600 dark:text-gray-200">
      <!-- Notificações -->
      <label class="flex items-center justify-between cursor-pointer">
        <span>Desativar notificações</span>
        <input type="checkbox" id="toggle-notify" class="hidden peer">
        <div class="w-10 h-5 bg-blue-900 rounded-full peer-checked:bg-blue-400 relative">
          <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition peer-checked:translate-x-5"></div>
        </div>
      </label>


      <!-- Emails -->
      <label class="flex items-center justify-between cursor-pointer">
        <span>Receber emails semanais</span>
        <input type="checkbox" id="toggle-email" class="hidden peer">
        <div class="w-10 h-5 bg-blue-900 rounded-full peer-checked:bg-blue-400 relative">
          <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition peer-checked:translate-x-5"></div>
        </div>
      </label>

      <!-- Privacidade -->
      <label class="flex items-center justify-between cursor-pointer">
        <span>Perfil privado</span>
        <input type="checkbox" id="toggle-private" class="hidden peer">
        <div class="w-10 h-5 bg-blue-900 rounded-full peer-checked:bg-blue-400 relative">
          <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition peer-checked:translate-x-5"></div>
        </div>
      </label>
    </div>

    <div class="flex justify-end gap-3 mt-6">
      <button id="close-config" class="px-4 py-2 rounded-lg bg-gray-300 hover:bg-gray-400 dark:bg-gray-700 dark:hover:bg-gray-600">Fechar</button>
      <button id="save-config" class="px-4 py-2 rounded-lg bg-blue-500 text-white hover:bg-blue-600">Salvar</button>
    </div>
  </div>
</div>



<!-- Caixa de Notificações -->
<div id="notify-box" class="hidden absolute top-16 right-6 w-64 text-white bg-blue-600 shadow-lg rounded-xl p-3">
  <h3 class="font-semibold mb-2">Notificações</h3>
  <ul class="text-sm space-y-2">
    <li>📩 Você recebeu uma nova mensagem</li>
    <li>🏆 Você ganhou 100 XP!</li>
  </ul>
</div>

<script>
  // Botão Configurações
  const btnConfig = document.getElementById("btn-config");
const configModal = document.getElementById("config-modal");
const closeConfig = document.getElementById("close-config");

btnConfig.addEventListener("click", () => {
  configModal.classList.remove("hidden");
});

closeConfig.addEventListener("click", () => {
  configModal.classList.add("hidden");
});

// Fecha ao clicar fora do modal
configModal.addEventListener("click", (e) => {
  if (e.target === configModal) {
    configModal.classList.add("hidden");
  }
});


  // Botão Notificações
  const btnNotify = document.getElementById("btn-notify");
  const notifyBox = document.getElementById("notify-box");

  btnNotify.addEventListener("click", () => {
    notifyBox.classList.toggle("hidden");
  });


</script>

  <!-- Script -->
 <script>
  const buttons = document.querySelectorAll('.nav-btn');

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      // resetar todos
      buttons.forEach(b => {
        b.classList.remove('active', 'bg-blue-500', 'text-white');
        const img = b.querySelector('img');
        if (img) {
          img.src = img.dataset.black; // volta pra versão preta
        }
      });

      // ativar clicado
      btn.classList.add('active', 'bg-blue-500', 'text-white');
      const img = btn.querySelector('img');
      if (img) {
        img.src = img.dataset.white; // troca pra versão branca
      }
    });
  });

  // ao carregar a página já marcar o Home
  const homeBtn = document.querySelector('.nav-btn');
  if (homeBtn) {
    homeBtn.classList.add('active', 'bg-blue-500', 'text-white');
    const img = homeBtn.querySelector('img');
    if (img) img.src = img.dataset.white;
  }
</script>


  <!-- CONTEÚDO PRINCIPAL -->
  <section class="flex-1 bg-white rounded-2xl p-6">

    
    
  </section>
</main>




</body>
</html>
